version: "1"

project: amaur
packages:
  - name: db
    engine: postgresql
    path: ./internal/infrastructure/postgres/sqlcgen
    queries: ./sqlc/queries
    schema: ./migrations
    gen:
      go:
        package: sqlcgen
        out: ./internal/infrastructure/postgres/sqlcgen
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
